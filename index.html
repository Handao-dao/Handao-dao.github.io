<!doctype html>
<html lang="zh-CN">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Dao 的 Nanobot 学习笔记</title>
    <style>
        :root {
            --bg: #f6f2ea;
            --paper: #fffdf8;
            --text: #263238;
            --muted: #6f7c80;
            --line: #e3d8c8;
            --accent: #356b7f;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC", "Microsoft YaHei", sans-serif;
            background:
                radial-gradient(circle at top left, rgba(53, 107, 127, 0.12), transparent 32rem),
                linear-gradient(180deg, #faf7f0 0%, var(--bg) 100%);
            color: var(--text);
        }

        main {
            width: min(920px, calc(100% - 40px));
            margin: 0 auto;
            padding: 64px 0;
        }

        header {
            margin-bottom: 36px;
        }

        .eyebrow {
            margin: 0 0 10px;
            color: var(--accent);
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        h1 {
            margin: 0;
            font-size: clamp(34px, 6vw, 58px);
            line-height: 1.08;
            letter-spacing: 0;
        }

        .intro {
            max-width: 660px;
            margin: 18px 0 0;
            color: var(--muted);
            font-size: 18px;
            line-height: 1.8;
        }

        .notes {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 14px;
            margin-top: 32px;
        }

        .note {
            display: block;
            min-height: 118px;
            padding: 20px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: rgba(255, 253, 248, 0.86);
            color: inherit;
            text-decoration: none;
            transition: transform 160ms ease, border-color 160ms ease, background 160ms ease;
        }

        .note:hover {
            transform: translateY(-2px);
            border-color: rgba(53, 107, 127, 0.45);
            background: var(--paper);
        }

        .note-title {
            display: block;
            color: var(--accent);
            font-size: 22px;
            font-weight: 750;
            line-height: 1.3;
        }

        .note-meta {
            display: block;
            margin-top: 12px;
            color: var(--muted);
            font-size: 14px;
            line-height: 1.6;
        }

        footer {
            margin-top: 42px;
            padding-top: 22px;
            border-top: 1px solid var(--line);
            color: var(--muted);
            font-size: 14px;
        }

        @media (max-width: 560px) {
            main {
                width: min(100% - 28px, 920px);
                padding: 42px 0;
            }

            .intro {
                font-size: 16px;
            }

            .note {
                min-height: auto;
            }
        }
    </style>
</head>

<body>
    <main>
        <header>
            <p class="eyebrow">Dao · SiYuan Notes</p>
            <h1>Dao 的学习笔记</h1>
            <p class="intro">这里整理我从思源笔记发布出来的内容，主要记录系统设计、工具链、上下文工程和 Agent 相关学习。</p>
        </header>

        <section class="notes" aria-label="笔记目录">
            <a class="note" href="/Agent-loop/">
                <span class="note-title">Agent loop</span>
                <span class="note-meta">Agent 循环与执行流程</span>
            </a>

            <a class="note" href="/Provider/">
                <span class="note-title">Provider</span>
                <span class="note-meta">模型与服务提供方</span>
            </a>

            <a class="note" href="/Tool/">
                <span class="note-title">Tool</span>
                <span class="note-meta">工具调用与能力扩展</span>
            </a>

            <a class="note" href="/Context/">
                <span class="note-title">Context</span>
                <span class="note-meta">上下文组织与传递</span>
            </a>

            <a class="note" href="/Bus/">
                <span class="note-title">Bus</span>
                <span class="note-meta">消息总线与模块协作</span>
            </a>

            <a class="note" href="/WebUI/">
                <span class="note-title">WebUI</span>
                <span class="note-meta">前端界面与交互入口</span>
            </a>

            <a class="note" href="/Gateway/">
                <span class="note-title">Gateway</span>
                <span class="note-meta">网关层与请求分发</span>
            </a>
        </section>

        <footer>
            Published by Dao with SiYuan Pages Publisher.
        </footer>
    </main>
</body>

</html>
